name: Git Flow Sync
on:
  pull_request:
    types: [closed]
    branches: [main, development]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup and Sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Get info
          BRANCH="${{ github.event.pull_request.head.ref }}"
          TARGET="${{ github.event.pull_request.base.ref }}"
          
          # Branch protection validation
          if [ "$TARGET" = "main" ]; then
            # Main branch: only hotfix/* and release/* allowed
            if [[ ! "$BRANCH" =~ ^(hotfix|release)/ ]]; then
              echo "❌ INVALID MERGE TO MAIN!"
              echo "❌ Branch: $BRANCH"
              echo "❌ Only hotfix/* and release/* can merge to main"
              # Revert the merge (if possible) or create issue
              gh issue create --title "🚨 Invalid merge to main: $BRANCH" --body "Branch $BRANCH was merged to main but only hotfix/* and release/* are allowed!"
              exit 1
            fi
          elif [ "$TARGET" = "development" ]; then
            # Development branch: only hotfix/*, release/*, feature/* allowed  
            if [[ ! "$BRANCH" =~ ^(hotfix|release|feature)/ ]]; then
              echo "❌ INVALID MERGE TO DEVELOPMENT!"
              echo "❌ Branch: $BRANCH"
              echo "❌ Only hotfix/*, release/*, and feature/* can merge to development"
              # Revert the merge (if possible) or create issue
              gh issue create --title "🚨 Invalid merge to development: $BRANCH" --body "Branch $BRANCH was merged to development but only hotfix/*, release/*, and feature/* are allowed!"
              exit 1
            fi
          fi
          
          # Check if hotfix or release for sync
          if [[ ! "$BRANCH" =~ ^(hotfix|release)/ ]]; then
            echo "Not a hotfix or release branch - no sync needed"
            exit 0
          fi
          
          # Determine sync direction
          if [ "$TARGET" = "main" ]; then
            SYNC_TO="development"
          elif [ "$TARGET" = "development" ]; then
            SYNC_TO="main"
          else
            exit 0
          fi
          
          # Try merge
          git fetch origin
          git checkout $SYNC_TO
          
          echo "🔄 Attempting to merge $TARGET into $SYNC_TO..."
          
          if git merge origin/$TARGET -m "Sync from $TARGET after $BRANCH" --no-edit; then
            echo "✅ Merge successful!"
            if git push origin $SYNC_TO; then
              echo "🎉 Successfully synced $TARGET to $SYNC_TO"
            else
              echo "❌ Push failed"
              exit 1
            fi
          else
            echo "⚠️ Merge conflicts detected - creating resolution PR..."
            
            # Abort the failed merge
            git merge --abort
            
            # Create conflict resolution branch
            SYNC_BRANCH="sync-conflict-$(date +%s)-${GITHUB_RUN_NUMBER}"
            
            # Start fresh from target branch  
            git checkout -b $SYNC_BRANCH origin/$TARGET
            
            # Try merge again to create conflict state
            git merge origin/$SYNC_TO -m "WIP: Resolve conflicts between $TARGET and $SYNC_TO" || {
              echo "Conflicts preserved for manual resolution"
            }
            
            # Push conflict branch
            git push origin $SYNC_BRANCH
            
            # Create PR with detailed info
            PR_BODY="## 🚨 Sync Conflicts Detected

**Original Branch**: $BRANCH  
**Merged to**: $TARGET  
**Sync Target**: $SYNC_TO  

### 🔧 To Resolve:
1. \`git checkout $SYNC_BRANCH\`
2. Resolve conflicts in affected files
3. \`git add .\` and \`git commit\`  
4. \`git push origin $SYNC_BRANCH\`
5. Merge this PR

**Files with conflicts will be marked with conflict markers.**"

            gh pr create \
              --base $SYNC_TO \
              --head $SYNC_BRANCH \
              --title "🚨 Sync Conflicts: $TARGET → $SYNC_TO" \
              --body "$PR_BODY" \
              --label "sync-conflict" || echo "PR creation failed"
              
            echo "✅ Conflict resolution PR created: $SYNC_BRANCH"
          fi